<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>device-width>, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
body{
    background-image: url("https://i.pinimg.com/736x/d3/01/ea/d301ea916d3827ca2924860983da4cdf.jpg"); 
    background-size: 100%;
    text-align:center;
}

.container-box{
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    width:500px;
    margin:auto;
    padding:25px;
    border-radius:25px;

    border:1px solid rgba(255,255,255,0.3);
}

input{
    width:200px;
    display:inline-block;
    background: rgba(255,255,255,0.8);
    border:none;
}

button{
    margin-left:10px;
}
</style>
<body>
<br><br><br><br><br><br>

    <h2 style="color:aliceblue">Electricity Consumption Classifier</h2>

        <div class="container-box">
        <label style="color:white; font-size:25px;">kWh</label>
        <input type="number" id="usage" class="form-control d-inline">

        <button class="btn btn-info" onclick="checkUsage()">Classify</button>
    </div>

    <script>
        function checkUsage(){

        let usage = Number(document.getElementById("usage").value);

        if (isNaN(usage) || usage < 0 ){
            alert("Please input a valid number.")
        }
        else if(usage <= 100){
            alert("Lifeline Consumer: Discounted electricity rates.");
        }

        else if(usage <= 200){
            alert("Low Consumption: Normal residential rate.");
        }

        else if(usage <= 300){
            alert("Average Consumption: Typical electricity usage.");
        }

        else if(usage <= 500){
            alert("High Consumption: Higher electricity usage.");
        }

        else{
            alert("Heavy Consumption: Very high electricity usage.");
        }

}

</script>

</body>
</html>
